name: Release Build

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (for native modules)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup build environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        continue-on-error: true

      - name: Download third-party dependencies
        run: |
          echo "🔄 Downloading latest fntv-mpv-config..."
          
          # 获取最新 release 的下载链接
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/QiaoKes/fntv-mpv-config/releases/latest)
          DOWNLOAD_URL=$(echo $LATEST_RELEASE | grep -o '"browser_download_url": "[^"]*\.zip"' | grep -o 'https[^"]*')
          
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ No zip file found, using fallback..."
            mkdir -p third_party/fntv-mpv/portable_config
            echo "# MPV Default Config" > third_party/fntv-mpv/portable_config/mpv.conf
          else
            echo "📦 Downloading from: $DOWNLOAD_URL"
            
            # 下载并直接解压到目标目录
            curl -L -o mpv-config.zip "$DOWNLOAD_URL"
            mkdir -p third_party
            unzip -q mpv-config.zip -d third_party/
            
            # 重命名 mpv-package-* 目录为 fntv-mpv
            MPV_PACKAGE_DIR=$(find third_party -maxdepth 1 -name "mpv-package-*" -type d | head -1)
            if [ -n "$MPV_PACKAGE_DIR" ]; then
              mv "$MPV_PACKAGE_DIR" third_party/fntv-mpv
              echo "✅ MPV config extracted to third_party/fntv-mpv"
            else
              echo "❌ mpv-package directory not found, using fallback..."
              mkdir -p third_party/fntv-mpv/portable_config
              echo "# MPV Default Config" > third_party/fntv-mpv/portable_config/mpv.conf
            fi
            
            rm -f mpv-config.zip
          fi
          
          echo "📁 Final structure:"
          find third_party/fntv-mpv -type d | head -5
        shell: bash

      - name: Compile TypeScript
        run: npm run compile

      - name: Build application
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            npm run build:win
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            npm run build:mac
          else
            npm run build:linux
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: release/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=format:'%s')" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Get package version
        id: package
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: find artifacts -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.package.outputs.version }}-${{ steps.commit.outputs.sha }}
          name: 飞牛影视 v${{ steps.package.outputs.version }} (${{ steps.commit.outputs.sha }})
          body: |
            ## 🎬 飞牛影视 v${{ steps.package.outputs.version }}
            
            ### 📦 构建信息
            - **提交哈希**: `${{ steps.commit.outputs.sha }}`
            - **提交信息**: ${{ steps.commit.outputs.message }}
            - **提交作者**: ${{ steps.commit.outputs.author }}
            - **构建时间**: ${{ steps.commit.outputs.date }}
            - **源分支**: `release`
            
            ### 💻 支持平台
            - ✅ Windows (x64)
            - ✅ macOS (Intel & Apple Silicon)
            - ✅ Linux (x64 & ARM64)
            
            ### 📥 下载指南
            | 平台 | 文件类型 | 说明 |
            |------|----------|------|
            | 🪟 Windows | `.exe` | 安装程序，双击运行 |
            | 🍎 macOS | `.dmg` | 磁盘镜像，拖拽到应用程序文件夹 |
            | 🐧 Linux | `.AppImage` | 便携应用，添加执行权限后直接运行 |
            
            ### 🔄 更新内容
            ```
            ${{ steps.commit.outputs.message }}
            ```
            
            ---
            *自动构建于 GitHub Actions* 🤖
          files: |
            artifacts/windows-build/*.exe
            artifacts/macos-build/*.dmg
            artifacts/linux-build/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
