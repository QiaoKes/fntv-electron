name: afdian-action

on:
  schedule: # Run workflow automatically
    - cron: '0 * * * *' # Runs every hour, on the hour
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the Github Actions Workflow page directly

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Afdian action
        uses: yiyungent/afdian-action@main
        with:
          # 在 Settings->Secrets 配置 AFDIAN_USERID, AFDIAN_TOKEN
          # 爱发电 user_id
          afdian_userId: ${{ secrets.AFDIAN_USERID }}
          # 爱发电 token
          afdian_token: ${{ secrets.AFDIAN_TOKEN }}
          # 默认为: .github/afdian-action.cshtml
          template_filePath: ".github/afdian-action.cshtml"
          # 默认为: README.md
          target_filePath: "README.md"
          assemblyReferences: "System.Runtime, Version=6.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"
          usings: "System"

      # 检查是否有变更并创建 PR
      - name: Check for changes and create PR
        run: |
          # 配置 git
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有变更
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes detected, skipping PR creation"
            exit 0
          fi
          
          # 创建新的分支名称（使用时间戳确保唯一性）
          BRANCH_NAME="afdian-update-$(date +%Y%m%d-%H%M%S)"
          
          # 创建并切换到新分支
          git checkout -b "$BRANCH_NAME"
          
          # 添加并提交变更
          git add .
          git commit -m "[skip ci] 爱发电赞助信息更新"
          
          # 推送分支
          git push origin "$BRANCH_NAME"
          
          # 创建 Pull Request
          gh pr create \
            --title "🤖 爱发电赞助信息自动更新" \
            --body "## 🤖 自动更新爱发电赞助信息

          此 PR 由 GitHub Actions 自动创建，用于更新爱发电赞助信息。

          ### 更改内容
          - 📝 更新 README.md 中的赞助信息

          ### 说明
          - ✅ 此更新不会触发 release 构建流水线
          - 🔍 请检查更新内容是否正确
          - ✅ 确认无误后可直接合并" \
            --base release \
            --head "$BRANCH_NAME" \
            --label "documentation,automated,afdian" \
            --assignee QiaoKes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}