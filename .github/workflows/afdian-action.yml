name: afdian-action

on:
  schedule: # Run workflow automatically
    - cron: '0 * * * *' # Runs every hour, on the hour
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the Github Actions Workflow page directly

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Afdian action
        uses: yiyungent/afdian-action@main
        with:
          # 在 Settings->Secrets 配置 AFDIAN_USERID, AFDIAN_TOKEN
          # 爱发电 user_id
          afdian_userId: ${{ secrets.AFDIAN_USERID }}
          # 爱发电 token
          afdian_token: ${{ secrets.AFDIAN_TOKEN }}
          # 默认为: .github/afdian-action.cshtml
          template_filePath: ".github/afdian-action.cshtml"
          # 默认为: README.md
          target_filePath: "README.md"
          assemblyReferences: "System.Runtime, Version=6.0.0.0, Culture=neutral, PublicKeyToken=b03f5f7f11d50a3a"
          usings: "System"

      # 使用 peter-evans/create-pull-request 创建 PR
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[skip ci] 爱发电赞助信息更新"
          branch: afdian-action/update
          delete-branch: true
          branch-suffix: short-commit-hash
          base: release
          title: "🤖 [afdian-action] 爱发电赞助信息更新"
          body: |
            ## 🤖 自动更新爱发电赞助信息
            
            此 PR 由 GitHub Actions 自动创建，用于更新爱发电赞助信息。
            
            ### 更改内容
            - 📝 更新 README.md 中的赞助信息
            
            ### 说明
            - ✅ 此更新不会触发 release 构建流水线
            - 🔍 请检查更新内容是否正确
            - ✅ 确认无误后可直接合并
            
            ---
            *由 afdian-action 自动生成*
          labels: |
            documentation
            afdian-action
            automated pr
          assignees: QiaoKes
